<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Saruê</title>


    <link rel="stylesheet" href="/static/styles.css?v=3">


    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>
    <div id="page">
        <header id="header">
            <img src="/static/Sarue.png" alt="Saruê" id="name"/>
            <img src="/static/Fiocruz.png" alt="Fiocruz" id="fiocruz"/>
        </header>

        <main id="content">
            <section id="map-card">
                <h3>Mapa das UBS</h3>
                <div id="map"></div>
            </section>

            <aside id="chat-card">
                <h3>Assistente de informações</h3>
                <h4>Posso ajudar em algo?</h4>
                <div id="messages"></div>
                <textarea placeholder="Digite sua dúvida..."></textarea>
            </aside>
        </main>

        <footer id="footer">
            <span>© 2026 Saruê · Fiocruz Brasília</span>
            <span id="grupo">Grupo de Inteligência Computacional na Saúde (GICS)</span> 
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="/static/script.js" defer></script>
</body>
</html>
